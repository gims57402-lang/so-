<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Ultimate Premium Homepage</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
}

/* 카드 */
.card{
  max-width:900px;
  margin:20px auto;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
}

/* 버튼 */
nav{text-align:center;}
nav button{
  margin:10px;
  padding:12px 20px;
  border:none;
  border-radius:30px;
  background:rgba(255,255,255,0.2);
  color:white;
  cursor:pointer;
}

/* 그래프 */
.chart{
  display:flex;
  justify-content:space-around;
  align-items:flex-end;
  height:200px;
}

.bar{
  width:60px;
  background:linear-gradient(to top,#00f2fe,#4facfe);
  text-align:center;
  border-radius:10px;
}

/* 창 */
.window{display:none;}
</style>
</head>

<body>

<h1 style="text-align:center;">🌟 부산 ESG & 뉴스 플랫폼</h1>

<nav>
<button onclick="openWin('home')">홈</button>
<button onclick="openWin('news')">뉴스</button>
<button onclick="openWin('data')">ESG</button>
</nav>

<!-- 홈 -->
<div id="home" class="window">
<div class="card">
<h2>소개</h2>
<p>부산 · ESG · 부경대 정보를 한눈에</p>
</div>
</div>

<!-- 뉴스 (🔥 실제 뉴스 적용) -->
<div id="news" class="window">
<div class="card">
<h2>📰 최신 뉴스</h2>

<ul>
<li>부경대, ESG 기반 교육 프로그램 운영 확대</li>
<li>부산 환경산업 ESG 워크숍 개최</li>
<li>부경대, 해양수산 전문인력 양성사업 선정</li>
</ul>

</div>
</div>

<!-- ESG (🔥 그래프 버전) -->
<div id="data" class="window">
<div class="card">

<h2>📊 부산 ESG 통계 (그래프)</h2>

<div class="chart">
  <div>
    <div class="bar" style="height:120px;">60%</div>
    <p>ESG 도입</p>
  </div>
  
  <div>
    <div class="bar" style="height:150px;">70%</div>
    <p>성장률</p>
  </div>

  <div>
    <div class="bar" style="height:200px;">99%</div>
    <p>중소기업</p>
  </div>
</div>

<p>✔ ESG는 부산에서 빠르게 성장 중</p>

</div>
</div>

<script>
function openWin(id){
  document.querySelectorAll('.window').forEach(w=>w.style.display='none');
  document.getElementById(id).style.display='block';
}
openWin('home');
</script>

</body>
</html>
