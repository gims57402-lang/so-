<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Ultimate Profile</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#f0f4ff,#fdf6f9);
}

/* 헤더 */
header {
  background:linear-gradient(90deg,#4a6fa5,#6b8dd6);
  color:white;
  padding:25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.profile {
  width:100px;
  height:100px;
  border-radius:50%;
  border:3px solid white;
}

/* 메뉴 */
nav {
  background:#2f3e5c;
  padding:10px;
  text-align:center;
}

nav button {
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  background:#ff8fab;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

nav button:hover {
  background:#ff5d8f;
}

/* 창 */
.window {
  display:none;
  padding:30px;
}

.card {
  background:white;
  max-width:900px;
  margin:20px auto;
  padding:25px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-8px);
}

/* 애니메이션 */
.fade {
  animation: fadeIn 0.7s;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}
</style>

</head>

<body>

<header>
  <div>
    <h1>✨ My Smart Homepage</h1>
    <p>부경대학교 · 사회복지학과</p>
  </div>
  <img src="profile.png" class="profile">
</header>

<nav>
  <button onclick="openWin('home')">🏠 홈</button>
  <button onclick="openWin('weather')">🌤 날씨</button>
  <button onclick="openWin('news')">📰 뉴스</button>
  <button onclick="openWin('data')">📊 통계</button>
</nav>

<!-- 홈 -->
<div id="home" class="window fade">
  <div class="card">
    <h2>👋 소개</h2>
    <p>안녕하세요 😊 사회복지를 공부하는 학생입니다.</p>
  </div>

  <div class="card">
    <h2>💡 관심 분야</h2>
    <p>아동복지 / 상담 / 정책</p>
  </div>
</div>

<!-- 날씨 -->
<div id="weather" class="window fade">
  <div class="card">
    <h2>🌤 날씨</h2>
    <p id="weatherBox">불러오는 중...</p>
  </div>
</div>

<!-- 뉴스 -->
<div id="news" class="window fade">
  <div class="card">
    <h2>📰 뉴스</h2>
    <ul id="newsList"></ul>
  </div>
</div>

<!-- 통계 -->
<div id="data" class="window fade">
  <div class="card">
    <h2>📊 사회복지 통계</h2>
    <p>아동복지 이용률: 65%</p>
    <p>노인복지 이용률: 80%</p>
    <p>장애인복지 이용률: 55%</p>
  </div>
</div>

<script>
function openWin(id){
  document.querySelectorAll('.window').forEach(w=>w.style.display='none');
  const target = document.getElementById(id);
  target.style.display='block';
  target.classList.add('fade');
}
openWin('home');

/* 날씨 */
setTimeout(()=>{
  document.getElementById("weatherBox").innerHTML =
  "부산 🌞 24°C / 서울 ☁️ 22°C";
},800);

/* 뉴스 */
setTimeout(()=>{
  document.getElementById("newsList").innerHTML = `
    <li>부경대 취업 프로그램 확대</li>
    <li>부산 복지 정책 강화</li>
    <li>청년 지원 사업 증가</li>
  `;
},800);
</script>

</body>
</html>
