<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>2026 ss 패션 트렌드를 분석해줄게 나만 따라오라긔!</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family: "Comic Sans MS", cursive;
  overflow:hidden;
}

/* 타이틀 */
.title {
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  font-size:28px;
  color:#ff00aa;
  text-shadow:0 0 10px yellow, 0 0 20px hotpink;
}

/* 윈도우 */
.window {
  position:absolute;
  width:280px;
  background:#111;
  border:3px solid hotpink;
  border-radius:15px;
  padding:10px;
  box-shadow:0 0 15px #ff00ff;
}

.window h3 {
  margin:0 0 10px;
  color:yellow;
}

/* 이미지 */
img {
  width:100%;
  border-radius:10px;
  border:3px solid white;
}

/* 버튼 */
button {
  background:hotpink;
  border:none;
  padding:5px;
  color:white;
  cursor:pointer;
}

/* 방명록 */
textarea {
  width:100%;
}

/* 반짝이 */
.sparkle {
  position:absolute;
  width:6px;
  height:6px;
  background:yellow;
  border-radius:50%;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="title">✨ 2026 SS 패션 트렌드 따라오라긔 ✨</div>

<!-- 🎧 BGM -->
<audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_9d1e2c9c4f.mp3">
</audio>

<!-- 📸 만화 증명사진 -->
<div class="window" style="top:80px; left:40px;">
<h3>👤 MY PROFILE (만화 ver)</h3>
<img src="data:image/png;base64,여기에_너_만화증명사진_base64">
</div>

<!-- 👗 패션 트렌드 -->
<div class="window" style="top:80px; left:350px;">
<h3>👗 패션 트렌드</h3>
<button onclick="openFashion()">보러가기</button>
</div>

<!-- 📊 사회복지 통계 -->
<div class="window" style="top:80px; left:660px;">
<h3>📊 사회복지 통계</h3>
<canvas id="welfareChart" width="250" height="150"></canvas>
<p style="font-size:12px;">청년 우울감 / 노인 빈곤율</p>
</div>

<!-- 🌊 부산 ESG 통계 -->
<div class="window" style="top:380px; left:40px;">
<h3>🌱 부산 ESG 경영</h3>
<canvas id="esgChart" width="250" height="150"></canvas>
<p style="font-size:12px;">친환경 기업 증가 추세</p>
</div>

<!-- 🏫 부경대 뉴스 -->
<div class="window" style="top:380px; left:350px;">
<h3>🏫 부경대 뉴스</h3>
<p>✔ AI융합 학과 인기 상승 🔥</p>
<p>✔ 취업률 증가 추세 📈</p>
</div>

<!-- 💌 방명록 -->
<div class="window" style="top:380px; left:660px;">
<h3>💌 방명록</h3>
<textarea id="guestText"></textarea>
<button onclick="addGuest()">등록</button>
<ul id="guestList"></ul>
</div>

<script>

/* ✨ 반짝이 커서 */
document.addEventListener("mousemove", e=>{
  let s=document.createElement("div");
  s.className="sparkle";
  s.style.left=e.pageX+"px";
  s.style.top=e.pageY+"px";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),500);
});

/* 📝 방명록 */
function addGuest(){
  let text=document.getElementById("guestText").value;
  let li=document.createElement("li");
  li.innerText=text;
  document.getElementById("guestList").appendChild(li);
}

/* 👗 패션 페이지 */
function openFashion(){
  let w=window.open("","_blank","width=500,height=500");
  w.document.write(`
    <body style="background:black;color:white;font-family:cursive">
    <h1 style="color:hotpink">2026 SS 패션 트렌드</h1>
    <p>✔ Y2K + 글리터 ✨</p>
    <p>✔ 로우라이즈 복귀 👖</p>
    <p>✔ 친환경 소재 🌱</p>
    <p>✔ 컬러풀 & 형광 스타일 💖</p>
    </body>
  `);
}

/* 📊 사회복지 그래프 */
let wctx = document.getElementById("welfareChart").getContext("2d");
wctx.fillStyle="pink";
wctx.fillRect(10,100,30,-60);
wctx.fillRect(60,100,30,-90);

/* 🌱 ESG 그래프 */
let ectx = document.getElementById("esgChart").getContext("2d");
ectx.fillStyle="lightgreen";
ectx.fillRect(10,100,30,-40);
ectx.fillRect(60,100,30,-80);
ectx.fillRect(110,100,30,-100);

</script>

</body>
</html>
