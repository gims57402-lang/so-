<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>My Window Portfolio</title>

<style>
body {
  margin:0;
  background:#0f172a;
  font-family: 'Segoe UI';
  overflow:hidden;
  color:white;
}

/* 바탕 */
#desktop {
  width:100vw;
  height:100vh;
  position:relative;
}

/* 아이콘 */
.icon {
  width:90px;
  text-align:center;
  cursor:pointer;
  margin:20px;
  display:inline-block;
}
.icon img {
  width:60px;
}
.icon:hover {
  transform:scale(1.1);
}

/* 창 */
.window {
  width:500px;
  height:400px;
  background:white;
  color:black;
  position:absolute;
  top:100px;
  left:100px;
  border-radius:10px;
  display:none;
  overflow:auto;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.title-bar {
  background:#6366f1;
  color:white;
  padding:10px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
}

/* 방명록 */
input, textarea {
  width:90%;
  margin:5px;
}
button {
  margin:5px;
}

/* 커서 */
body {
  cursor: url('https://cur.cursors-4u.net/cursors/cur-9/cur817.cur'), auto;
}

</style>
</head>

<body>

<!-- 🎵 BGM -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3" type="audio/mp3">
</audio>

<div id="desktop">

<!-- 아이콘 -->
<div class="icon" onclick="openWin('profile')">
  <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
  <div>프로필</div>
</div>

<div class="icon" onclick="openWin('welfare')">
  <img src="https://cdn-icons-png.flaticon.com/512/2965/2965567.png">
  <div>사회복지</div>
</div>

<div class="icon" onclick="openWin('esg')">
  <img src="https://cdn-icons-png.flaticon.com/512/1041/1041884.png">
  <div>ESG 통계</div>
</div>

<div class="icon" onclick="openWin('news')">
  <img src="https://cdn-icons-png.flaticon.com/512/2965/2965879.png">
  <div>부경대 뉴스</div>
</div>

<div class="icon" onclick="openWin('guest')">
  <img src="https://cdn-icons-png.flaticon.com/512/747/747376.png">
  <div>방명록</div>
</div>

<div class="icon" onclick="window.open('fashion.html')">
  <img src="https://cdn-icons-png.flaticon.com/512/892/892458.png">
  <div>패션 트렌드</div>
</div>

<!-- 프로필 -->
<div class="window" id="profile">
  <div class="title-bar">프로필 <span onclick="closeWin('profile')">X</span></div>
  <div style="padding:10px">
    <h3>📅 오늘 날짜</h3>
    <p id="date"></p>

    <h3>📸 증명사진</h3>
    <!-- 여기에 base64 넣기 -->
    <img src="여기에_base64_붙여넣기" width="150">

    <h3>🙋 소개</h3>
    <p>사회복지 전공 / 트렌드 관심</p>
  </div>
</div>

<!-- 사회복지 -->
<div class="window" id="welfare">
  <div class="title-bar">사회복지 통계 <span onclick="closeWin('welfare')">X</span></div>
  <div style="padding:10px">
    
    

  </div>
</div>

<!-- ESG -->
<div class="window" id="esg">
  <div class="title-bar">부산 ESG 기업 비율 <span onclick="closeWin('esg')">X</span></div>
  <div style="padding:10px">

    

  </div>
</div>

<!-- 뉴스 -->
<div class="window" id="news">
  <div class="title-bar">부경대 뉴스 <span onclick="closeWin('news')">X</span></div>
  <div style="padding:10px">
    <ul>
      <li><a href="#" onclick="alert('산학협력 확대 뉴스')">산학협력 확대</a></li>
      <li><a href="#" onclick="alert('취업률 상승')">취업률 상승</a></li>
    </ul>
  </div>
</div>

<!-- 방명록 -->
<div class="window" id="guest">
  <div class="title-bar">방명록 <span onclick="closeWin('guest')">X</span></div>
  <div style="padding:10px">
    <input id="name" placeholder="이름"><br>
    <textarea id="msg" placeholder="메시지"></textarea><br>
    <button onclick="addMsg()">등록</button>
    <div id="list"></div>
  </div>
</div>

</div>

<script>
function openWin(id){
  document.getElementById(id).style.display='block';
}
function closeWin(id){
  document.getElementById(id).style.display='none';
}

// 날짜
document.getElementById("date").innerText = new Date().toLocaleDateString();

// 방명록
function addMsg(){
  let name=document.getElementById("name").value;
  let msg=document.getElementById("msg").value;
  let div=document.createElement("div");
  div.innerText=name+" : "+msg;
  document.getElementById("list").appendChild(div);
}
</script>

</body>
</html>
