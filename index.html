<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>2026 ss 패션 트렌드를 분석해줄게 나만 따라오라긔!</title>

<style>
body {
    margin:0;
    font-family:'Comic Sans MS';
    background:black;
    color:white;
    overflow:hidden;
    cursor:url('https://cur.cursors-4u.net/cursors/cur-2/cur116.cur'), auto;
}

/* 반짝이 */
.sparkle{
    position:fixed;
    width:8px;height:8px;
    border-radius:50%;
    pointer-events:none;
    animation:fade 1s forwards;
}
@keyframes fade{
    to{opacity:0; transform:scale(3);}
}

/* 윈도우 */
.window{
    position:absolute;
    width:300px;
    background:#111;
    border:2px solid hotpink;
    box-shadow:0 0 20px hotpink;
    padding:10px;
}

.title{
    color:#ff00ff;
    text-shadow:0 0 20px hotpink;
}

.profile{
    width:100px;
    border-radius:50%;
}
</style>
</head>

<body>

<!-- 💖 BGM -->
<audio autoplay loop>
<source src="data:audio/mp3;base64,여기에BGM붙여넣기">
</audio>

<!-- 💖 메인 -->
<div class="window" style="top:50px;left:50px;">
    <h2 class="title">WELCOME 💖</h2>

    <!-- 프로필 -->
    <img class="profile"
    src="data:image/png;base64,여기에프로필이미지">

    <br><br>

    <button onclick="openWin('fashion')">패션 💅</button>
    <button onclick="openWin('info')">정보 📊</button>
</div>

<!-- 💖 패션 -->
<div id="fashion" class="window" style="top:80px;left:400px;display:none;">
    <h3>2026 SS 트렌드</h3>
    <p>💖 Y2K / 메탈릭 / 네온</p>

    <img width="120"
    src="data:image/png;base64,여기에캐릭터이미지">
</div>

<!-- 💖 정보 -->
<div id="info" class="window" style="top:200px;left:200px;display:none;">
    <h3>📊 정보</h3>

    <p id="date"></p>

    <canvas id="chart" width="200" height="150"></canvas>
</div>

<!-- 💖 방명록 -->
<div class="window" style="top:350px;left:50px;">
    <h3>💬 방명록</h3>
    <input id="name"><br>
    <textarea id="msg"></textarea><br>
    <button onclick="addMsg()">등록</button>
    <ul id="list"></ul>
</div>

<script>
/* 창 */
function openWin(id){
    document.getElementById(id).style.display='block';
}

/* 반짝이 */
document.addEventListener("mousemove",e=>{
    for(let i=0;i<2;i++){
        let s=document.createElement("div");
        s.className="sparkle";
        s.style.left=e.pageX+"px";
        s.style.top=e.pageY+"px";
        s.style.background=["#ff00ff","#00ffff","#fff"][Math.floor(Math.random()*3)];
        document.body.appendChild(s);
        setTimeout(()=>s.remove(),1000);
    }
});

/* 날짜 */
document.getElementById("date").innerText=new Date().toLocaleDateString();

/* 방명록 */
function addMsg(){
    let li=document.createElement("li");
    li.innerText=
    document.getElementById("name").value+" : "+
    document.getElementById("msg").value;
    document.getElementById("list").appendChild(li);
}

/* 그래프 */
let ctx=document.getElementById("chart").getContext("2d");
ctx.fillStyle="pink";
ctx.fillRect(20,50,40,80);
ctx.fillRect(80,30,40,100);
ctx.fillRect(140,70,40,60);
</script>

</body>
</html>
