<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내 홈페이지</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            scroll-behavior: smooth;
        }
        section {
            height: 100vh;
            padding: 40px;
            box-sizing: border-box;
        }
        .section1 { background: #2c3e50; color: white; }
        .section2 { background: #ecf0f1; }
        .section3 { background: #dfe6e9; }
        .section4 { background: #f5f6fa; }

        h1, h2 {
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<section class="section1">
    <h1>내 정보 모음 홈페이지</h1>
    <p>스크롤해서 정보 확인 👇</p>
</section>

<section class="section2">
    <h2>🌤️ 부산 날씨</h2>
    <div id="weather" class="card">날씨 불러오는 중...</div>
</section>

<section class="section3">
    <h2>📰 부산 이슈</h2>
    <div class="card">부산 관광객 증가</div>
    <div class="card">부산 교통 정책 논의</div>
</section>

<section class="section4">
    <h2>🎓 부경대 뉴스</h2>
    <div class="card">부경대 연구 프로젝트 발표</div>
    <div class="card">창업 지원 확대</div>
</section>

<section class="section4">
    <h2>📊 사회복지 통계</h2>
    <div class="card">노인 빈곤율: 약 40%</div>
    <div class="card">청년 실업률 증가 추세</div>
</section>

<script>
    // 간단한 날씨 (샘플)
    document.getElementById("weather").innerText = "부산 현재 기온: 22°C / 맑음 ☀️";
</script>

</body>
</html>
