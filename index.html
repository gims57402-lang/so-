<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>💖 MyScene World 💖</title>

<style>
body{
  margin:0;
  font-family: "Comic Sans MS";
  background: linear-gradient(#ffb6c1,#ff69b4);
  overflow:hidden;
}

/* 메인 */
#main{
  text-align:center;
  height:100vh;
}

#main img{
  width:500px;
  margin-top:120px;
  cursor:pointer;
  animation:float 2s infinite alternate;
}

@keyframes float{
  from{transform:translateY(0);}
  to{transform:translateY(-20px);}
}

/* 창 */
.window{
  position:absolute;
  width:75%;
  height:75%;
  top:12%;
  left:12%;
  background:#fff0f5;
  border-radius:20px;
  box-shadow:0 0 40px rgba(0,0,0,0.4);
  display:none;
  overflow:auto;
}

/* 헤더 */
.header{
  background:linear-gradient(#ff69b4,#ffa6c9);
  padding:10px;
  font-weight:bold;
}

.close{
  float:right;
  cursor:pointer;
}

/* 카드 */
.card{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:15px;
}

/* 버튼 */
.button{
  padding:10px;
  margin:10px;
  border:none;
  background:#ff69b4;
  color:white;
  border-radius:15px;
  cursor:pointer;
}

/* 그래프 */
.bar{
  height:20px;
  background:#ff69b4;
  margin:5px 0;
}

/* 캐릭터 */
.character{
  text-align:center;
}

.character img{
  width:300px;
}
</style>

</head>

<body>

<!-- 💖 메인 -->
<div id="main">
  <img src="image(2).png" onclick="openWin('fashion')">
  <h1>💖 Click 💖</h1>
</div>

<!-- 👗 패션 -->
<div id="fashion" class="window">
  <div class="header">
    💖 2026 SS 패션 트렌드 💖
    <span class="close" onclick="closeWin('fashion')">X</span>
  </div>

  <div class="card">
    <h2>🎀 컬러</h2>
    <p>베이비핑크 / 실버 / 라벤더 / 틸</p>
  </div>

  <div class="card">
    <h2>🌀 패턴</h2>
    <p>글리치 / 홀로그램 / 플라워 / 컬러블록</p>
  </div>

  <div class="card">
    <h2>👕 스타일</h2>
    <p>크롭탑 · 로우라이즈 · Y2K 감성</p>
  </div>

  <!-- 캐릭터 -->
  <div class="character">
    <img src="f11fd78f725ad200df968a327101cb94(1).jpg">
  </div>

  <button class="button" onclick="openWin('info')">
    👉 부산 정보 보기
  </button>
</div>

<!-- 🌊 정보 -->
<div id="info" class="window">
  <div class="header">
    🌊 부산 정보 🌊
    <span class="close" onclick="closeWin('info')">X</span>
  </div>

  <div class="card">
    <h2>🌤 날씨</h2>
    <p>부산 ☀ 26°C 맑음</p>
  </div>

  <div class="card">
    <h2>📰 뉴스</h2>
    <ul>
      <li><a href="https://www.yna.co.kr" target="_blank">연합뉴스 바로가기</a></li>
      <li><a href="https://www.bbc.com" target="_blank">BBC 뉴스</a></li>
    </ul>
  </div>

  <div class="card">
    <h2>📊 ESG</h2>
    삼성 80%
    <div class="bar" style="width:80%"></div>
    LG 70%
    <div class="bar" style="width:70%"></div>
    스타트업 60%
    <div class="bar" style="width:60%"></div>
  </div>

  <div class="card">
    <h2>📈 사회복지</h2>
    <p>청년 지원 정책 증가</p>
  </div>

</div>

<script>
function openWin(id){
  document.getElementById(id).style.display="block";
}

function closeWin(id){
  document.getElementById(id).style.display="none";
}
</script>

</body>
</html>
