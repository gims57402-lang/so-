<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Ultimate Premium Homepage</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  overflow-x:hidden;
}

/* 헤더 */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  backdrop-filter:blur(10px);
}

.profile{
  width:80px;
  height:80px;
  border-radius:50%;
  border:2px solid white;
}

/* 메뉴 */
nav{
  text-align:center;
  margin-top:10px;
}

nav button{
  margin:10px;
  padding:12px 20px;
  border:none;
  border-radius:30px;
  background:rgba(255,255,255,0.2);
  color:white;
  font-weight:bold;
  cursor:pointer;
  backdrop-filter:blur(10px);
  transition:0.3s;
}

nav button:hover{
  background:#ff4ecd;
  transform:scale(1.1);
}

/* 윈도우 */
.window{
  display:none;
  padding:40px;
  animation:fade 0.5s;
}

@keyframes fade{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* 카드 */
.card{
  max-width:900px;
  margin:20px auto;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px) scale(1.02);
}

/* 그래프 */
.bar{
  background:rgba(255,255,255,0.2);
  border-radius:10px;
  margin:10px 0;
}

.fill{
  background:linear-gradient(90deg,#00f2fe,#4facfe);
  padding:6px;
  border-radius:10px;
  font-size:12px;
}

/* 뉴스 */
ul li{
  margin:10px 0;
  padding:10px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
}

/* 타이틀 */
h1{
  font-size:28px;
}

h2{
  border-bottom:2px solid rgba(255,255,255,0.3);
  padding-bottom:5px;
}
</style>
</head>

<body>

<header>
<div>
<h1>🌟 Premium Homepage</h1>
<p>부경대학교 · 사회복지학과</p>
</div>
<img src="profile.png" class="profile">
</header>

<nav>
<button onclick="openWin('home')">🏠 홈</button>
<button onclick="openWin('weather')">🌤 날씨</button>
<button onclick="openWin('news')">📰 뉴스</button>
<button onclick="openWin('data')">📊 통계</button>
</nav>

<!-- 홈 -->
<div id="home" class="window">
<div class="card">
<h2>✨ 소개</h2>
<p>눈길을 사로잡는 프리미엄 홈페이지 🚀</p>
<p>ESG · 뉴스 · 날씨를 한눈에 확인하세요</p>
</div>
</div>

<!-- 날씨 -->
<div id="weather" class="window">
<div class="card">
<h2>🌤 부산 날씨</h2>
<p id="weatherBox">불러오는 중...</p>
</div>
</div>

<!-- 뉴스 -->
<div id="news" class="window">
<div class="card">
<h2>📰 최신 뉴스</h2>
<ul id="newsList"></ul>
</div>
</div>

<!-- 통계 -->
<div id="data" class="window">
<div class="card">

<h2>📊 부산 ESG 통계</h2>

<h3>기업 구조</h3>
<p>중소기업 비율 99%</p>
<div class="bar"><div class="fill" style="width:99%">99%</div></div>

<h3>ESG 도입률</h3>
<div class="bar"><div class="fill" style="width:60%">60%</div></div>

<h3>ESG 성장률</h3>
<div class="bar"><div class="fill" style="width:70%">70%</div></div>

<h3>공공 목표</h3>
<p>미세먼지 40% 감소</p>
<p>일자리 40,000개 창출</p>

</div>
</div>

<script>
function openWin(id){
  document.querySelectorAll('.window').forEach(w=>w.style.display='none');
  document.getElementById(id).style.display='block';
}

openWin('home');

/* 날씨 */
setTimeout(()=>{
  document.getElementById("weatherBox").innerHTML="부산 ☀ 24°C 맑음";
},1000);

/* 뉴스 */
setTimeout(()=>{
  document.getElementById("newsList").innerHTML=
  "<li>부경대학교 최신 소식</li>" +
  "<li>부산 ESG 정책 확대</li>" +
  "<li>사회복지 통계 증가</li>";
},1000);
</script>

</body>
</html>
